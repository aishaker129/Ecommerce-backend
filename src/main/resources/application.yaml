
spring:
  application:
    name: CampusKart
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mvc:
    problemdetails:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

application:
  security:
    jwt:
      signing-key: ${JWT_SIGNING_KEY}           # moved to env var
      expiration-ms: ${JWT_EXPIRATION_MS:6000000}
    refresh-token:
      expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}

stripe:
  api-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${WEBHOOK_SECRET_KEY}
  success-url: ${STRIPE_SUCCESS_URL}
  cancel-url: ${STRIPE_CANCEL_URL}
  currency: bdt
server:
  port: 8081

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

