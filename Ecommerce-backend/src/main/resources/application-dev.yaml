spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ db
    username: root
    password: password

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  application:
    security:
      jwt:
        signing-key: your-signing-key
        expiration-ms: 600000 # 10 minutes
      refresh-token:
        expiration-ms: 604800000 # 7 days

stripe:
  api-key: sk_test_your_stripe_api_key
  success-url: http://localhost:8080/api/v1/payment/success?session_id={CHECKOUT_SESSION_ID}
  cancel-url: http://localhost:8080/api/v1/payment/cancel
  currency: bdt